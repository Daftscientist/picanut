version: "3.9"

services:
  app:
    build: .
    ports:
      - "8080:8000"
    environment:
      - DATABASE_URL=postgresql://labelflow:labelflow@db:5432/labelflow
      - WOO_WEBHOOK_SECRET=${WOO_WEBHOOK_SECRET:-changeme}
      - SECRET_KEY=${SECRET_KEY:-changeme-secret-key}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=labelflow
      - POSTGRES_PASSWORD=labelflow
      - POSTGRES_DB=labelflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labelflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
